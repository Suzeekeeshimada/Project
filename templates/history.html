<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Validation History</title>
</head>
<body>
    <div class="container" style="width: 80%;">
        <h1>Validation Run History</h1>
        <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="background: #f2f2f2;">
                    <th style="padding: 10px;">Timestamp</th>
                    <th style="padding: 10px;">Filename</th>
                    <th style="padding: 10px;">Prediction</th>
                    <th style="padding: 10px;">Confidence</th>
                </tr>
            </thead>
            <tbody>
                {% for row in history %}
                <tr>
                    <td style="padding: 8px;">{{ row[0] }}</td>
                    <td style="padding: 8px;">{{ row[1] }}</td>
                    <td style="padding: 8px;">{{ row[2] }}</td>
                    <td style="padding: 8px;">{{ row[3] }}%</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
